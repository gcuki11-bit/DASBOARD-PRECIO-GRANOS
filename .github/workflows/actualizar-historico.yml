name: Actualizar Histórico Precios
on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
jobs:
  scrapear-bcr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python fetch_historico.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.json
          git diff --staged --quiet || git commit -m "chore: actualizar histórico $(date +'%Y-%m-%d')"
          git push
